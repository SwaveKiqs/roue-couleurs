<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Roue des Couleurs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Syne', sans-serif;
    background: #0d0d0d;
    color: #fff;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
  }

  h1 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 20px;
  }

  .wheel-wrap {
    position: relative;
    width: min(82vw, 340px);
    height: min(82vw, 340px);
    flex-shrink: 0;
  }

  canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: block;
  }

  .needle {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 11px solid transparent;
    border-right: 11px solid transparent;
    border-top: 30px solid #fff;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
    z-index: 10;
  }

  .spin-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 68px; height: 68px;
    border-radius: 50%;
    background: #0d0d0d;
    border: 2.5px solid rgba(255,255,255,0.7);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: transform 0.12s, background 0.2s;
    -webkit-user-select: none;
    user-select: none;
  }

  .spin-btn:active { transform: translate(-50%, -50%) scale(0.94); background: #1a1a1a; }
  .spin-btn:disabled { opacity: 0.4; }

  .result-area {
    margin-top: 28px;
    text-align: center;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .result-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .result-name {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.02em;
    transition: color 0.5s ease;
    color: rgba(255,255,255,0.15);
  }

  .result-name.active {
    color: #fff;
  }

  .swatch-bar {
    width: 60px;
    height: 5px;
    border-radius: 99px;
    background: rgba(255,255,255,0.1);
    transition: background 0.5s ease;
    margin-top: 2px;
  }
</style>
</head>
<body>

<h1>Roue des Couleurs</h1>

<div class="wheel-wrap">
  <div class="needle"></div>
  <canvas id="c"></canvas>
  <button class="spin-btn" id="btn">GO</button>
</div>

<div class="result-area">
  <div class="result-label">Résultat</div>
  <div class="result-name" id="rName">—</div>
  <div class="swatch-bar" id="swatch"></div>
</div>

<script>
const COLORS = [
  { name: "Rouge",   hex: "#E84343" },
  { name: "Bleu",    hex: "#2E86DE" },
  { name: "Vert",    hex: "#27AE60" },
  { name: "Rose",    hex: "#E91E8C" },
  { name: "Violet",  hex: "#7B2FBE" },
  { name: "Marron",  hex: "#8B4513" },
  { name: "Orange",  hex: "#F5A623" },
  { name: "Jaune",   hex: "#F0D500" },
];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const btn = document.getElementById('btn');
const rName = document.getElementById('rName');
const swatch = document.getElementById('swatch');

const N = COLORS.length;
const slice = (2 * Math.PI) / N;

let dpr = window.devicePixelRatio || 1;
let size = Math.min(window.innerWidth * 0.82, 340);
canvas.width = size * dpr;
canvas.height = size * dpr;
ctx.scale(dpr, dpr);
const cx = size / 2, cy = size / 2, R = size / 2 - 2;

let angle = 0;
let spinning = false;

function luma(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255;
}

function draw(a) {
  ctx.clearRect(0, 0, size, size);
  for (let i = 0; i < N; i++) {
    const s = a + i * slice;
    const e = s + slice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, s, e);
    ctx.closePath();
    ctx.fillStyle = COLORS[i].hex;
    ctx.fill();
    ctx.strokeStyle = '#0d0d0d';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(s + slice / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = luma(COLORS[i].hex) > 0.5 ? 'rgba(0,0,0,0.85)' : 'rgba(255,255,255,0.95)';
    ctx.font = `700 ${Math.max(11, size * 0.038)}px 'Syne', sans-serif`;
    ctx.fillText(COLORS[i].name, R - 12, 5);
    ctx.restore();
  }
  // center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 36, 0, 2 * Math.PI);
  ctx.fillStyle = '#0d0d0d';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function getWinner(a) {
  const norm = (((-Math.PI / 2) - a) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  return Math.floor(norm / slice) % N;
}

function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

function spin() {
  if (spinning) return;
  spinning = true;
  btn.disabled = true;
  btn.textContent = '…';
  rName.textContent = '—';
  rName.classList.remove('active');
  swatch.style.background = 'rgba(255,255,255,0.1)';

  const extra = (6 + Math.floor(Math.random() * 6)) * 2 * Math.PI;
  const stop = Math.random() * 2 * Math.PI;
  const total = extra + stop;
  const dur = 3800;
  const t0 = performance.now();
  const a0 = angle;

  function frame(now) {
    const t = Math.min((now - t0) / dur, 1);
    angle = a0 + total * easeOut(t);
    draw(angle);
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      angle = angle % (2 * Math.PI);
      spinning = false;
      btn.disabled = false;
      btn.textContent = 'GO';
      const idx = getWinner(angle);
      const c = COLORS[idx];
      rName.textContent = c.name;
      rName.classList.add('active');
      swatch.style.background = c.hex;
      // haptic on iPhone
      if (window.navigator && window.navigator.vibrate) navigator.vibrate(40);
    }
  }
  requestAnimationFrame(frame);
}

draw(angle);
btn.addEventListener('click', spin);
</script>
</body>
</html>
